- hosts: backend
  become: yes

  vars:
    app_dir: /opt/backend-app
    key_vault_url: "https://tier3-app-kv.vault.azure.net/"

  tasks:

    - name: Update apt
      apt:
        update_cache: yes

    - name: Install Python packages
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy backend application
      copy:
        src: ./backend-files/
        dest: "{{ app_dir }}/"

    - name: Create Python virtual environment
      command: python3 -m venv {{ app_dir }}/venv
      args:
        creates: "{{ app_dir }}/venv"

    - name: Install Python requirements
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"

    - name: Set Key Vault URL
      lineinfile:
        path: /etc/environment
        line: 'KEY_VAULT_URL={{ key_vault_url }}'
        create: yes

    - name: Run backend app
      shell: |
        nohup {{ app_dir }}/venv/bin/python {{ app_dir }}/app.py &
